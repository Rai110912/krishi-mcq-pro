<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background emerald gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="60%" stop-color="#059669" />
      <stop offset="100%" stop-color="#064e3b" />
    </linearGradient>
    
    <!-- Golden wheat gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <!-- White shield gradient shadow -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- 1. Circular Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- 2. Stylized Outer Shield Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ffffff" stroke-width="8" stroke-opacity="0.15" />
  <circle cx="256" cy="256" r="190" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.08" />

  <!-- 3. Glowing central circular badge -->
  <circle cx="256" cy="256" r="150" fill="#047857" fill-opacity="0.4" stroke="#ffffff" stroke-width="4" filter="url(#dropShadow)" />

  <!-- 4. Modern Agriculture Wheat Stalk Motif (Center) -->
  <g transform="translate(256, 270) scale(1.65)" id="wheat-stalk">
    <!-- Main stem -->
    <path d="M0,20 C0,-10 0,-70 0,-95" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" />
    
    <!-- Left grains -->
    <path d="M0,-30 C-15,-30 -22,-45 -4,-50 C-2,-51 0,-40 0,-40" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="1" />
    <path d="M0,-50 C-18,-50 -25,-65 -6,-70 C-3,-71 0,-60 0,-60" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="1" />
    <path d="M0,-70 C-16,-70 -22,-85 -5,-90 C-2,-91 0,-80 0,-80" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="1" />
    
    <!-- Right grains -->
    <path d="M0,-20 C15,-20 22,-35 4,-40 C2,-41 0,-30 0,-30" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="1" />
    <path d="M0,-40 C18,-40 25,-55 6,-60 C3,-61 0,-50 0,-50" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="1" />
    <path d="M0,-60 C16,-60 22,-75 5,-80 C2,-81 0,-70 0,-70" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="1" />
    <path d="M0,-80 C12,-80 18,-92 4,-96 C2,-97 0,-88 0,-88" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="1" />
    
    <!-- Top terminal grain -->
    <path d="M0,-95 C0,-110 5,-115 0,-120 C-5,-115 0,-110 0,-95" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- 5. Modern Academic Graduation Cap Motif Overlay -->
  <path d="M210,310 L256,285 L302,310 L256,335 Z" fill="#ffffff" filter="url(#dropShadow)" />
  <path d="M228,320 L228,350 C228,360 284,360 284,350 L284,320" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" />
  <path d="M292,316 L310,345 L310,365" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="310" cy="367" r="4" fill="#ffffff" />
</svg>
